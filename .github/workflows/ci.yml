name: CI for project modules

on:
  pull_request:
    branches: [main]

  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      module:
        description: "Choose module to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - data_load
          - data_quality
          - data_research
          - visualization

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      data_load: ${{ steps.filter.outputs.data_load }}
      data_quality: ${{ steps.filter.outputs.data_quality }}
      data_research: ${{ steps.filter.outputs.data_research }}
      visualization: ${{ steps.filter.outputs.visualization }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed modules
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            data_load:
              - 'src/data_load/**'
              - 'data/raw/**'
            data_quality:
              - 'src/data_quality/**'
              - 'data/raw/**'
            data_research:
              - 'src/data_research/**'
              - 'data/**'
            visualization:
              - 'src/visualization/**'
              - 'reports/**'
              - 'data/**'

  run-modules:
    needs: detect-changes
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        module: [data_load, data_quality, data_research, visualization]

    if: |
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.module == 'all' || github.event.inputs.module == matrix.module)
      ||
      github.event_name != 'workflow_dispatch' &&
      (
        matrix.module == 'data_load' && needs.detect-changes.outputs.data_load == 'true' ||
        matrix.module == 'data_quality' && needs.detect-changes.outputs.data_quality == 'true' ||
        matrix.module == 'data_research' && needs.detect-changes.outputs.data_research == 'true' ||
        matrix.module == 'visualization' && needs.detect-changes.outputs.visualization == 'true'
      )

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create artifacts directory
        run: |
          mkdir -p artifacts/${{ matrix.module }}

      - name: Run data_load module
        if: matrix.module == 'data_load'
        run: |
          python src/data_load/load.py > artifacts/data_load/data_load_log.txt 2>&1

      - name: Run data_quality module
        if: matrix.module == 'data_quality'
        run: |
          python src/data_quality/quality_check.py > artifacts/data_quality/data_quality_log.txt 2>&1

      - name: Run data_research module
        if: matrix.module == 'data_research'
        run: |
          python src/data_research/research.py > artifacts/data_research/data_research_log.txt 2>&1

      - name: Run visualization module
        if: matrix.module == 'visualization'
        run: |
          python src/visualization/visualization.py > artifacts/visualization/visualization_log.txt 2>&1

      - name: Copy reports if exist
        run: |
          if [ -d reports ]; then cp -r reports/* artifacts/${{ matrix.module }}/ || true; fi

      - name: Upload module artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.module }}
          path: artifacts/${{ matrix.module }}